<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作者注册引导流程</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- React Router CDN -->
    <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.development.js"></script>
    <!-- Zustand CDN -->
    <script src="https://unpkg.com/zustand@4/dist/zustand.umd.js"></script>
    <!-- 全局变量配置 -->
    <script>
      window.React = React
      window.ReactDOM = ReactDOM
      window.BrowserRouter = ReactRouterDOM.BrowserRouter
      window.Routes = ReactRouterDOM.Routes
      window.Route = ReactRouterDOM.Route
      window.useNavigate = ReactRouterDOM.useNavigate
      window.Zustand = Zustand
    </script>
    <!-- Tailwind 配置 -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#4F46E5',
              secondary: '#6366F1',
              accent: '#8B5CF6',
              neutral: '#6B7280',
              'neutral-light': '#F3F4F6',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        }
      }
    </script>
  </head>
  <body class="bg-neutral-light min-h-screen">
    <div id="root"></div>
    <script src="src/store.js"></script>
    <script src="src/pages/LoginPage.jsx"></script>
    <script src="src/pages/NewAuthorFlow.jsx"></script>
    <script src="src/pages/AuthorDashboard.jsx"></script>
    <script src="src/App.jsx"></script>
    <script src="src/main.jsx"></script>
  </body>
</html>
